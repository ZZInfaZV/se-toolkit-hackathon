services:
  schedule-web:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: schedule-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SCHEDULE_DB_PATH=/app/data/schedule.db
      - SCHEDULE_SHEET_URL=${SCHEDULE_SHEET_URL}
    volumes:
      - schedule-data:/app/data
    ports:
      - "8080:8080"
    networks:
      - default
      - lms-network

volumes:
  schedule-data:

networks:
  default:
    driver: bridge
  lms-network:
    external: true
